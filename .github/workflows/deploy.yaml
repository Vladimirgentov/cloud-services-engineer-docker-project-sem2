name: Docker Project CI

on:
  push:
    branches:
      - main
      - docker-project
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-compose-build:
    name: Build with Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check repository files
        run: |
          test -s docker-compose.yml
          test -s backend/Dockerfile
          test -s frontend/Dockerfile
          test -s README.md

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build images
        run: docker compose build

  trivy-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: docker-compose-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: momo-store-backend:1.0.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: momo-store-frontend:1.0.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
